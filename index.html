<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Forecast App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Budget Forecast</h1>
        <p>Forecast your monthly balance with editable income and expenses.</p>
      </div>
      <div class="creator">Application created by Jorge Caballero</div>
    </header>

    <main>
      <section class="controls card">
        <div class="input-grid">
          <label>
            Starting Date
            <input type="month" id="startDate" required />
          </label>
          <label>
            End Date
            <input type="month" id="endDate" required />
          </label>
          <label>
            Initial Balance
            <input type="number" id="initialBalance" step="0.01" value="0" />
          </label>
          <label>
            Monthly Income (Default)
            <input type="number" id="defaultIncome" step="0.01" value="0" />
          </label>
        </div>
        <button id="generateBtn">Generate Forecast</button>
      </section>

      <section class="card">
        <h2 id="balanceHeading">Current Forecasted Ending Balance: $0.00</h2>
        <div class="table-wrap">
          <table id="forecastTable" aria-label="Budget forecast table">
            <thead>
              <tr>
                <th>Month</th>
                <th>Monthly Income</th>
                <th>Monthly Expenses</th>
                <th>Special Expenses</th>
                <th>Net Change</th>
                <th>Ending Balance</th>
              </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
              <tr>
                <th>Totals</th>
                <th id="totalIncome">$0.00</th>
                <th id="totalMonthlyExpenses">$0.00</th>
                <th id="totalSpecialExpenses">$0.00</th>
                <th id="totalNetChange">$0.00</th>
                <th id="finalBalance">$0.00</th>
              </tr>
            </tfoot>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
